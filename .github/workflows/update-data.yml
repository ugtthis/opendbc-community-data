name: Update data

on:
  schedule:
    - cron: "0 10 * * *" # 2:00 AM PST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Fetch configured markdown sources
        run: python3 fetch_md_sources.py

      - name: Convert markdown to JSON
        run: python3 markdown_to_json.py

      - name: Enrich upstream gaps
        run: python3 enrich_upstream_gaps.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          commit-message: "[BOT] Update data"
          branch: update-data
          delete-branch: true
          title: "[bot] Update data"
          body: ""
          add-paths: |
            md_sources.json
            data/ref/*.md
            data/*.json
